services:  
  django_admin:
    hostname: authenticationservice
    build:
      context: ./portfolio_django_admin
      dockerfile: Dockerfile
    container_name: myportfolio-djangoadmin
    command: uv run uvicorn portfolio_django_admin.asgi:application --host 0.0.0.0 --port ${DJANGO_ADMIN_LOCAL_PORT:-8000} --reload
    volumes:
      - ./portfolio_django_admin/src:/usr/local/app/src
    ports:
      - "${DJANGO_ADMIN_HOST_PORT:-8000}:${DJANGO_ADMIN_LOCAL_PORT:-8000}"

    networks:
      - platform_net

    env_file:
      - ./.env

  celery_worker:
    build:
      context: ./portfolio_django_admin
      dockerfile: Dockerfile
    hostname: celeryworker
    container_name: celery-worker
    env_file:
      - ./.env
    networks:
      - platform_net
    volumes:
      - ./portfolio_django_admin/src:/usr/local/app/src
    command: uv run celery -A portfolio_django_admin.celery worker --loglevel=info

networks:
  platform_net:
    driver: bridge
    name: my-portfolio-network
    external: true